name: Zocial Eye Crisis Monitor

on:
  # ตัว trigger จริงคือ cron-job.org (ยิง workflow_dispatch ตอน 09:00 เวลาไทย — ตรงเวลากว่า GitHub cron)
  # ไม่ใช้ GitHub schedule เพื่อกันส่งอีเมลซ้ำหาลูกค้า
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      TZ: Asia/Bangkok

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run crisis monitor
        env:
          ZOCIAL_ID:          ${{ secrets.ZOCIAL_ID }}
          ZOCIAL_PASS:        ${{ secrets.ZOCIAL_PASS }}
          CAMPAIGN_ID:        ${{ secrets.CAMPAIGN_ID }}
          EXPORT_EMAIL:       ${{ secrets.EXPORT_EMAIL }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
        run: python monitor.py
